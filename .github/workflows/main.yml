# CI: lint-free test run against disposable PostgreSQL (ArrayField / RAG schema).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: acu_ci
          POSTGRES_PASSWORD: acu_ci_secret
          POSTGRES_DB: acibadem_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U acu_ci -d acibadem_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: acu_chatbot.settings_test
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: acibadem_test
      POSTGRES_USER: acu_ci
      POSTGRES_PASSWORD: acu_ci_secret
      POSTGRES_TEST_DB: acibadem_test
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short

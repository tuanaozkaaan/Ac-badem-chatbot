<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACUdost</title>
    <style>
      :root {
        --bg: #0e1117;
        --panel: #151922;
        --panel-soft: #1c2230;
        --panel-border: #2a3344;
        --text: #eef2f8;
        --muted: #9aa6b8;
        --accent: #5b8cff;
        --accent-hover: #4a78e8;
        --assistant-bubble: #1e2433;
        --user-bubble: #3d5bdc;
        --shadow: 0 14px 36px rgba(0, 0, 0, 0.22);
        --shadow-soft: 0 10px 24px rgba(0, 0, 0, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background-image: url("{% static 'chatbot/assets/acibadem-bg.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        color: var(--text);
        position: relative;
        overflow: hidden; /* prevent page scroll -> avoid layout "sliding" */
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, rgba(12, 16, 24, 0.45), rgba(18, 24, 36, 0.55));
        backdrop-filter: blur(6px) saturate(1.05);
        z-index: 0;
        pointer-events: none;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(260px, 300px) 1fr;
        height: 100vh;
        height: 100dvh; /* stable on mobile + prevents jump */
        min-height: 100vh;
        position: relative;
        z-index: 1;
      }

      .sidebar {
        border-right: 1px solid var(--panel-border);
        background: linear-gradient(180deg, rgba(18, 22, 30, 0.98), rgba(14, 17, 24, 0.98));
        padding: 14px 12px 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
      }

      .sidebar-heading {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 4px 6px 0;
      }

      .conv-list {
        flex: 1;
        min-height: 0;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding-right: 2px;
      }

      .conv-list::-webkit-scrollbar {
        width: 6px;
      }

      .conv-list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 99px;
      }

      .conv-item {
        width: 100%;
        text-align: left;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(26, 31, 42, 0.65);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 10px 8px;
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
      }

      .conv-item:hover {
        background: rgba(36, 44, 60, 0.88);
        border-color: rgba(91, 140, 255, 0.35);
      }

      .conv-item:active {
        transform: scale(0.99);
      }

      .conv-item.active {
        border-color: rgba(91, 140, 255, 0.65);
        background: rgba(40, 56, 92, 0.55);
        box-shadow: 0 0 0 1px rgba(91, 140, 255, 0.12);
      }

      .conv-item-title {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        word-break: break-word;
      }

      .conv-item-meta {
        margin-top: 4px;
        font-size: 11px;
        color: var(--muted);
      }

      .new-chat-btn {
        position: sticky;
        top: 12px;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(23, 26, 33, 0.85);
        color: var(--text);
        padding: 12px 14px;
        border-radius: 14px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 650;
        letter-spacing: 0.01em;
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(10px);
      }

      .new-chat-btn:hover {
        background: rgba(32, 37, 48, 0.92);
        border-color: rgba(77, 124, 255, 0.45);
      }

      .main {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .topbar {
        height: 60px;
        border-bottom: 1px solid var(--panel-border);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
        background: rgba(15, 17, 21, 0.92);
        backdrop-filter: blur(6px);
      }

      .topbar h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
      }

      .chat-shell {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .messages-wrap {
        flex: 1;
        overflow: auto;
        padding: 26px 18px 28px;
      }

      .messages {
        max-width: 860px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .welcome {
        max-width: 860px;
        margin: 0 auto;
        padding: 60px 0 32px;
        display: grid;
        place-items: center;
        color: var(--muted);
      }

      .welcome-card {
        width: 100%;
        max-width: 720px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(15, 17, 21, 0.62);
        backdrop-filter: blur(10px);
        border-radius: 18px;
        padding: 26px 22px;
        box-shadow: var(--shadow);
        text-align: center;
      }

      .welcome-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(23, 26, 33, 0.65);
        color: #cfd7e6;
        font-size: 12px;
        letter-spacing: 0.03em;
      }

      .welcome-title {
        margin: 14px 0 8px;
        color: var(--text);
        font-size: 28px;
        font-weight: 650;
        line-height: 1.15;
      }

      .welcome-subtitle {
        margin: 0 auto;
        max-width: 52ch;
        font-size: 14px;
        line-height: 1.55;
      }

      .suggestions {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        text-align: left;
      }

      .suggestion-card {
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(23, 26, 33, 0.78);
        border-radius: 14px;
        padding: 12px 12px;
        cursor: pointer;
        color: #dbe4f4;
        box-shadow: var(--shadow-soft);
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
        user-select: none;
      }

      .suggestion-card:hover {
        transform: translateY(-1px);
        border-color: rgba(77, 124, 255, 0.45);
        background: rgba(32, 37, 48, 0.9);
      }

      .suggestion-card:active {
        transform: translateY(0px);
      }

      .suggestion-card .label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .suggestion-card .text {
        display: block;
        font-size: 14px;
        line-height: 1.35;
        word-break: break-word;
      }

      .message-row {
        display: flex;
      }

      .message-row.assistant {
        justify-content: flex-start;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .bubble {
        max-width: min(82%, 720px);
        border-radius: 18px;
        padding: 14px 16px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.2);
      }

      .bubble.assistant {
        background: rgba(28, 34, 48, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .bubble.user {
        background: linear-gradient(165deg, rgba(91, 140, 255, 0.95), rgba(61, 91, 220, 0.92));
        border: 1px solid rgba(255, 255, 255, 0.14);
      }

      .loading-card {
        border-radius: 16px;
        padding: 16px 18px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(120deg, rgba(32, 38, 52, 0.95), rgba(24, 28, 40, 0.95));
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
      }

      .loading-shimmer {
        height: 10px;
        border-radius: 6px;
        margin-top: 10px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.06) 0%,
          rgba(255, 255, 255, 0.14) 50%,
          rgba(255, 255, 255, 0.06) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.2s ease-in-out infinite;
      }

      .loading-shimmer.narrow {
        width: 55%;
      }

      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      .loading-dots {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }

      .loading-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #aeb8c7;
        opacity: 0.35;
        animation: blink 1s infinite ease-in-out;
      }

      .loading-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .loading-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        40% {
          opacity: 1;
          transform: scale(1.15);
        }
      }

      .composer-wrap {
        flex-shrink: 0;
        border-top: 1px solid var(--panel-border);
        padding: 14px 18px 18px;
        background: rgba(14, 17, 23, 0.88);
        backdrop-filter: blur(12px);
      }

      .composer {
        max-width: 860px;
        margin: 0 auto;
        border: 1px solid var(--panel-border);
        background: rgba(23, 26, 33, 0.85);
        border-radius: 16px;
        padding: 10px;
        box-shadow: var(--shadow-soft);
      }

      .input-box {
        width: 100%;
        min-height: 48px;
        max-height: 180px;
        resize: none;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--text);
        font-size: 15px;
        line-height: 1.45;
        font-family: inherit;
      }

      .composer-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 8px;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .send-btn {
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        font-weight: 600;
        padding: 9px 14px;
        cursor: pointer;
      }

      .send-btn:hover {
        background: var(--accent-hover);
      }

      .send-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      @media (max-width: 920px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          display: none;
        }

        .messages-wrap {
          padding: 16px 12px 10px;
        }

        .composer-wrap {
          padding: 10px 12px 14px;
        }

        .welcome {
          padding: 30px 0 20px;
        }

        .welcome-card {
          padding: 18px 14px;
          border-radius: 16px;
        }

        .welcome-title {
          font-size: 22px;
        }

        .suggestions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
        <div class="sidebar-heading">Sohbetler</div>
        <div class="conv-list" id="convList" aria-label="Sohbet geçmişi"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <h1>ACUdost</h1>
        </header>

        <section class="chat-shell">
          <div class="messages-wrap" id="messagesWrap">
            <div class="messages" id="messages"></div>
            <div class="welcome" id="welcome">
              <div class="welcome-card">
                <div class="welcome-badge">ACUdost • University Assistant</div>
                <h2 class="welcome-title">How can I help you today?</h2>
                <p class="welcome-subtitle">Ask anything about Acibadem University, admissions, departments, campus, or contact info.</p>
                <div class="suggestions" id="suggestions"></div>
              </div>
            </div>
          </div>

          <div class="composer-wrap">
            <div class="composer">
              <textarea
                class="input-box"
                id="questionInput"
                placeholder="Message ACUdost..."
                rows="1"
              ></textarea>
              <div class="composer-footer">
                <span class="hint">Enter to send, Shift + Enter for new line</span>
                <button class="send-btn" id="sendBtn">Send</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      // Same-origin by default so it works with both runserver and Docker port mappings.
      const API_URL = "/ask";
      const API_CONV = "/api/conversations/";
      const FETCH_TIMEOUT_MS = 240000;
      const messagesEl = document.getElementById("messages");
      const messagesWrapEl = document.getElementById("messagesWrap");
      const welcomeEl = document.getElementById("welcome");
      const suggestionsEl = document.getElementById("suggestions");
      const questionInput = document.getElementById("questionInput");
      const sendBtn = document.getElementById("sendBtn");
      const newChatBtn = document.getElementById("newChatBtn");
      const convListEl = document.getElementById("convList");

      const conversation = [];
      let loadingBubble = null;
      let currentConversationId = null;
      let conversationsCache = [];

      const SUGGESTIONS = [
        { label: "Get started", text: "How can I help you today?" },
        { label: "Campus", text: "Acıbadem Üniversitesi adresi nedir?" },
        { label: "Academics", text: "Bölüm başkanı kimdir?" },
        { label: "Contact", text: "İletişim bilgileri nelerdir?" },
      ];

      function formatConvTitle(c) {
        const t = (c && c.title) ? String(c.title).trim() : "";
        return t || "Yeni sohbet";
      }

      function formatShortTime(iso) {
        if (!iso) return "";
        try {
          const d = new Date(iso);
          return d.toLocaleString("tr-TR", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
        } catch (_e) {
          return "";
        }
      }

      async function loadConversations() {
        if (!convListEl) return;
        try {
          const r = await fetch(API_CONV);
          if (!r.ok) return;
          const data = await r.json();
          conversationsCache = Array.isArray(data.results) ? data.results : [];
          renderConvList();
        } catch (_e) {}
      }

      function renderConvList() {
        if (!convListEl) return;
        convListEl.innerHTML = "";
        for (const c of conversationsCache) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "conv-item" + (c.id === currentConversationId ? " active" : "");
          btn.dataset.id = String(c.id);
          const title = document.createElement("div");
          title.className = "conv-item-title";
          title.textContent = formatConvTitle(c);
          const meta = document.createElement("div");
          meta.className = "conv-item-meta";
          meta.textContent = formatShortTime(c.updated_at);
          btn.appendChild(title);
          btn.appendChild(meta);
          btn.addEventListener("click", () => {
            void selectConversation(c.id);
          });
          convListEl.appendChild(btn);
        }
      }

      function appendStaticBubble(role, text) {
        const row = document.createElement("div");
        row.className = `message-row ${role}`;
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        bubble.textContent = text;
        row.appendChild(bubble);
        messagesEl.appendChild(row);
      }

      async function selectConversation(id) {
        currentConversationId = id;
        clearLoading();
        try {
          const r = await fetch(`${API_CONV}${id}/`);
          if (!r.ok) return;
          const data = await r.json();
          messagesEl.innerHTML = "";
          conversation.length = 0;
          const msgs = Array.isArray(data.messages) ? data.messages : [];
          for (const m of msgs) {
            conversation.push({ role: m.role, content: m.content });
            appendStaticBubble(m.role, m.content);
          }
          renderWelcome();
          renderConvList();
          scrollToBottom();
        } catch (_e) {}
      }

      function autoResizeInput() {
        questionInput.style.height = "auto";
        questionInput.style.height = `${Math.min(questionInput.scrollHeight, 180)}px`;
      }

      function scrollToBottom() {
        messagesWrapEl.scrollTop = messagesWrapEl.scrollHeight;
      }

      function renderWelcome() {
        welcomeEl.style.display = conversation.length ? "none" : "block";
      }

      function renderSuggestions() {
        if (!suggestionsEl) return;
        suggestionsEl.innerHTML = "";
        for (const item of SUGGESTIONS) {
          const card = document.createElement("button");
          card.type = "button";
          card.className = "suggestion-card";
          card.innerHTML = `<span class="label">${item.label}</span><span class="text">${item.text}</span>`;
          card.addEventListener("click", () => {
            // Fill + send immediately (ChatGPT-like quick action)
            questionInput.value = item.text;
            autoResizeInput();
            sendMessage();
          });
          suggestionsEl.appendChild(card);
        }
      }

      function createMessageBubble(role, text) {
        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        bubble.textContent = text;

        row.appendChild(bubble);
        messagesEl.appendChild(row);
        return bubble;
      }

      function addMessage(role, text) {
        conversation.push({ role, text });
        createMessageBubble(role, text);
        renderWelcome();
        scrollToBottom();
      }

      function formatElapsed(ms) {
        if (ms < 1000) return `${Math.round(ms)} ms`;
        return `${(ms / 1000).toFixed(2)} sn`;
      }

      /** Assistant bubble + footer with round-trip time for /ask POST */
      function addAssistantMessageWithTiming(text, elapsedMs) {
        conversation.push({ role: "assistant", text, elapsedMs });
        const row = document.createElement("div");
        row.className = "message-row assistant";
        const bubble = document.createElement("div");
        bubble.className = "bubble assistant";
        const body = document.createElement("div");
        body.style.whiteSpace = "pre-wrap";
        body.style.wordBreak = "break-word";
        body.style.lineHeight = "1.45";
        body.textContent = text;
        const foot = document.createElement("div");
        foot.style.marginTop = "10px";
        foot.style.fontSize = "11px";
        foot.style.color = "var(--muted)";
        foot.style.borderTop = "1px solid rgba(255, 255, 255, 0.08)";
        foot.style.paddingTop = "8px";
        foot.textContent = `Yanıt süresi: ${formatElapsed(elapsedMs)}`;
        bubble.appendChild(body);
        bubble.appendChild(foot);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
        renderWelcome();
        scrollToBottom();
      }

      function showLoading() {
        const row = document.createElement("div");
        row.className = "message-row assistant";
        const card = document.createElement("div");
        card.className = "loading-card";
        card.innerHTML =
          '<div style="font-size:13px;font-weight:650;color:var(--text);letter-spacing:0.01em">Yanıt hazırlanıyor</div>' +
          '<div style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.45">Model ve veri araması birkaç saniye ile birkaç dakika arası sürebilir.</div>' +
          '<div class="loading-shimmer"></div><div class="loading-shimmer narrow"></div>';
        row.appendChild(card);
        messagesEl.appendChild(row);
        loadingBubble = row;
        renderWelcome();
        scrollToBottom();
      }

      function clearLoading() {
        if (loadingBubble) {
          loadingBubble.remove();
          loadingBubble = null;
        }
      }

      function setSendingState(isSending) {
        sendBtn.disabled = isSending;
        questionInput.disabled = isSending;
      }

      async function sendMessage() {
        const question = questionInput.value.trim();
        if (!question) return;

        addMessage("user", question);
        questionInput.value = "";
        autoResizeInput();
        setSendingState(true);
        showLoading();

        const t0 = performance.now();
        const controller = new AbortController();
        const timeoutId = window.setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
        const payload = { question };
        if (currentConversationId != null) {
          payload.conversation_id = currentConversationId;
        }
        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            signal: controller.signal,
          });

          clearLoading();

          if (!response.ok) {
            let errMessage = `HTTP ${response.status}`;
            const rawError = await response.text();
            try {
              const errJson = JSON.parse(rawError || "{}");
              errMessage = errJson.detail || errJson.error || errMessage;
              if (typeof errJson.conversation_id === "number") {
                currentConversationId = errJson.conversation_id;
              }
            } catch (_e) {
              errMessage = (rawError || errMessage).slice(0, 300);
            }
            addAssistantMessageWithTiming(`API error: ${errMessage}`, performance.now() - t0);
            void loadConversations();
            return;
          }

          const data = await response.json();
          if (typeof data.conversation_id === "number") {
            currentConversationId = data.conversation_id;
          }
          addAssistantMessageWithTiming(data.answer || "No answer returned.", performance.now() - t0);
          void loadConversations();
        } catch (error) {
          clearLoading();
          const elapsedMs = performance.now() - t0;
          if (error && error.name === "AbortError") {
            addAssistantMessageWithTiming(
              "İstek zaman aşımı (4 dk): sunucu yanıt vermedi. Ollama/model yavaş olabilir veya veritabanında çok chunk taranıyordu; web konteynerını yeniden başlatıp tekrar dene.",
              elapsedMs
            );
          } else {
            addAssistantMessageWithTiming(`Connection error: ${error.message}`, elapsedMs);
          }
          void loadConversations();
        } finally {
          window.clearTimeout(timeoutId);
          setSendingState(false);
          questionInput.focus();
        }
      }

      sendBtn.addEventListener("click", sendMessage);
      newChatBtn.addEventListener("click", () => {
        currentConversationId = null;
        conversation.length = 0;
        messagesEl.innerHTML = "";
        clearLoading();
        renderWelcome();
        renderConvList();
        questionInput.focus();
      });

      questionInput.addEventListener("input", autoResizeInput);
      questionInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });

      renderWelcome();
      renderSuggestions();

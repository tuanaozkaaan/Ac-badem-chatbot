# Production-oriented base stack: Django (web) + PostgreSQL (db) + Ollama.
#
# Security posture:
# - Required secrets use ${VAR:?msg} so Compose refuses to start without them.
# - db and ollama are not published to the host; ``web`` and ``frontend`` are published.
# - Each service has a healthcheck and `restart: unless-stopped`.
#
# Local development conveniences (bind-mounts, exposed db/ollama ports, runserver) live in
# docker-compose.override.yml, which Compose merges automatically when present.
#
# The ``web`` entrypoint runs ``manage.py ollama_pull`` on boot, which is idempotent;
# it skips quickly when the model is already present. Manual fallback (rarely needed):
#   docker compose exec ollama ollama pull gemma:7b

services:
  web:
    build: .
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: acu_chatbot.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS is required}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma:7b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-256}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.15}
      OLLAMA_TOP_P: ${OLLAMA_TOP_P:-0.9}
      OLLAMA_HTTP_TIMEOUT: ${OLLAMA_HTTP_TIMEOUT:-240}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-300}
    ports:
      - "${WEB_HOST_PORT:-8001}:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status==200 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      # ALWAYS in-container Django (Compose service name ``web``, port 8000). Do **not**
      # interpolate from repo ``.env`` — that file often sets ``ACU_BACKEND_URL`` to
      # ``127.0.0.1`` for host-side ``npm run dev``, which breaks this container's proxy.
      ACU_BACKEND_URL: "http://web:8000"
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>process.exit(r.statusCode>=200&&r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    # Pinned to a known-stable release so Gemma 7B integration tests stay reproducible.
    image: ollama/ollama:0.3.12
    expose:
      - "11434"
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
